name: Complete Research Reconstruction

on:
  workflow_dispatch:

jobs:
  canonical-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python3 -m pip install -r requirements-validation.txt
      - run: python3 scripts/validate_reproducibility.py manifests --verify-inputs
      - run: python3 scripts/reproduce.py --manifest manifests/canonical_research_suite.json --output-directory ${{ runner.temp }}/canonical-suite --build-directory build-reproduce --execution-mode parallel --threads 4 --allow-compatible-environment --json-report ${{ runner.temp }}/canonical-suite-report.json
      - run: python3 scripts/validate_reproducibility.py manifests --verify-inputs --report ${{ runner.temp }}/canonical-suite-report.json
